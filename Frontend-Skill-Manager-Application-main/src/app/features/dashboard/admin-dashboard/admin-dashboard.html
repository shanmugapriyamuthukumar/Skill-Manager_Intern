<div class="container py-3">
  <h2>Skill Manager System</h2>

  <div *ngIf="success" class="alert alert-success">{{ success }}</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="card mb-3">
    <div class="card-header">{{ isEditing ? 'Edit Skill' : 'Add Skill' }}</div>
    <div class="card-body">
      <form (ngSubmit)="submit()" #f="ngForm" novalidate>
        <div class="row g-2">
          <div class="col-md-4">
            <label class="form-label">Name *</label>
            <input class="form-control" [(ngModel)]="form.name" name="name" required />
          </div>

          <div class="col-md-4">
            <label class="form-label">Category</label>
            <input class="form-control" [(ngModel)]="form.category" name="category" />
          </div>

          <div class="col-md-2">
            <label class="form-label">Level (1-5)</label>
            <input type="number" min="1" max="5" class="form-control"
                   [(ngModel)]="form.level" name="level" />
          </div>

          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input type="checkbox" class="form-check-input"
                     [(ngModel)]="form.active" name="active" id="activeChk">
              <label for="activeChk" class="form-check-label">Active</label>
            </div>
          </div>
        </div>

        <div class="mt-2">
          <label class="form-label">Description</label>
          <textarea class="form-control" rows="2"
                    [(ngModel)]="form.description" name="description"></textarea>
        </div>

        <div class="mt-3">
          <button class="btn btn-primary me-2" type="submit">
            {{ isEditing ? 'Update' : 'Create' }}
          </button>
          <button class="btn btn-secondary" type="button" *ngIf="isEditing" (click)="cancelEdit()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Skills</div>
    <div class="card-body p-0">
      <table class="table table-striped table-hover mb-0">
        <thead>
          <tr>
            <th style="width:60px">ID</th>
            <th>Name</th>
            <th>Category</th>
            <th style="width:90px">Level</th>
            <th style="width:90px">Active</th>
            <th style="width:160px">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of skills">
            <td>{{ s.id }}</td>
            <td>
              <strong>{{ s.name }}</strong><br>
              <small class="text-muted">{{ s.description }}</small>
            </td>
            <td>{{ s.category }}</td>
            <td>{{ s.level }}</td>
            <td>
              <span class="badge" [ngClass]="s.active ? 'bg-success' : 'bg-secondary'">
                {{ s.active ? 'Yes' : 'No' }}
              </span>
            </td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-2" (click)="edit(s)">Edit</button>
              <button class="btn btn-sm btn-outline-danger" (click)="remove(s.id)">Delete</button>
            </td>
          </tr>
          <tr *ngIf="skills.length === 0">
            <td colspan="6" class="text-center text-muted">No skills found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
